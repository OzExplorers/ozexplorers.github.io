<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="site-footer-inner">
        {%- assign currentYear = 'now' | date: "%Y" -%}
        {%- assign copyright = site.copyright
            | replace: '{currentYear}', currentYear
            | replace: '{author}', site.author
            | replace: '(c)', '&copy;'
            | replace: '(p)', '℗'
            | replace: '(cleft)', '<span class="copyleft">&copy;</span>'
        -%}
      <div class="footer-col rss-subscribe">Subscribe: 
        <a href="{{ "/feed.xml" | relative_url }}">RSS</a>
        <a href="https://twitter.com/oz_explorer" title="Twitter" target="_blank" rel="noopener noreferrer"><i
      class="fa fa-brands fa-twitter" aria-hidden="true"></i></a>
        <a title="Twitter" href="https://twitter.com/oz_explorer">Twitter</a>
        <a title="Youtube" href="https://www.youtube.com/channel/UCnLpquk3Lzi5oeTe_MJGAqA">Youtube</a>
      </div>
      <div>{{ copyright }}</div>
    </div>
  </div>
</footer>
